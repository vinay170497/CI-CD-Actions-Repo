name: Python QA Automation Pipeline

on:
  push:
    branches: [ main ] # Runs every time you push to main
  pull_request:
    branches: [ main ] # Runs on every PR

jobs:
  automation-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pytest requests playwright
          python -m playwright install chromium

      - name: Execute Cloud & Playwright Tests
        env:
          # This pulls the secret we saved in Step 1
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: pytest -s -v
