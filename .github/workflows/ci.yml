name: Python QA Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  automation-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ollama (Runner Side)
        run: |
          curl -fsSL https://ollama.com | sh
          ollama serve & 
          # Give it time to initialize
          sleep 10 
          # Pre-pull the lightweight model for your tests
          ollama pull tinyllama:latest

      - name: Install Dependencies
        run: |
          pip install pytest requests pytest-playwright
          # Install browser binaries and system-level dependencies
          python -m playwright install --with-deps chromium

      - name: Execute Automation Tests
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        # Added --color=yes to make CI logs easier to read
        run: pytest -s -v --color=yes
