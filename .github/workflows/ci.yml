name: Python QA Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  automation-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and Start Ollama
        run: |
          # Use the explicit install.sh URL to avoid HTML redirects
          curl -fsSL https://ollama.com/install.sh | sh
          
          # Start the server in the background
          ollama serve & 
          
          # Wait for the server to be responsive
          echo "Waiting for Ollama server to start..."
          until curl -s http://localhost:11434 > /dev/null; do
            sleep 5
          done
          
          # Pull the model for CI tests
          echo "Pulling tinyllama model..."
          ollama pull tinyllama:latest

      - name: Install Dependencies
        run: |
          pip install pytest requests pytest-playwright
          # Install browser binaries and system-level dependencies
          python -m playwright install --with-deps chromium

      - name: Execute Automation Tests
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        # Added --color=yes to make CI logs easier to read
        run: pytest -s -v --color=yes
