name: Python QA Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  automation-tests:
    runs-on: ubuntu-latest
    # --- ADD THIS SECTION ---
    outputs:
      passed_count: ${{ steps.pytest_step.outputs.passed_count }}
      total_count: ${{ steps.pytest_step.outputs.total_count }}
    # ------------------------
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and Start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve & 
          echo "Waiting for Ollama server to start..."
          until curl -s http://localhost:11434 > /dev/null; do
            sleep 5
          done
          echo "Pulling tinyllama model..."
          ollama pull tinyllama:latest

      - name: Install Dependencies
        run: |
          pip install pytest requests pytest-playwright pytest-json-report
          python -m playwright install --with-deps chromium

      - name: Execute Automation Tests
        id: pytest_step
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          # Run tests and ensure we generate the json report
          pytest -s -v --json-report --json-report-file=report.json || true
          
          # Extract counts
          PASSED=$(jq '.summary.passed // 0' report.json)
          TOTAL=$(jq '.summary.total // 0' report.json)
          
          # Set the outputs so the Job-level outputs can pick them up
          echo "passed_count=$PASSED" >> $GITHUB_OUTPUT
          echo "total_count=$TOTAL" >> $GITHUB_OUTPUT
          echo "Final Result: $PASSED out of $TOTAL tests passed."

- name: Upload test report
  uses: actions/upload-artifact@v4
  with:
    name: pytest-report
    path: report.json